name: Seller Feedback Report

on:
  # Every 3 days at 10:30 AM ET (2:30 PM UTC)
  schedule:
    - cron: "30 14 */3 * *"

  # Manual trigger so you can run it anytime
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate and post report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPORT_CHANNEL_ID: ${{ secrets.REPORT_CHANNEL_ID }}
          SKIP_CHANNELS: ${{ secrets.SKIP_CHANNELS }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: node index.js